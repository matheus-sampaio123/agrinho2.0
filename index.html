<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrinho</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="header">
  <div class="container nav-container">
    <h1 class="logo">🌱 Agrinho</h1>

    <nav id="nav" class="nav">
      <a href="#inicio">Início</a>
      <a href="#sobre">Sobre</a>
      <a href="#recursos">Recursos</a>
    </nav>

    <div class="nav-actions">
      <button id="themeBtn">🌙</button>
      <button id="menuBtn">☰</button>
    </div>
  </div>
</header>

<main>

<section id="inicio" class="hero reveal">
  <div class="hero-content">
    <h2>Conectando Campo & Cidade</h2>
    <p>Educação, sustentabilidade e futuro 🌱</p>

    <a href="#sobre" class="btn">Explorar</a>

    <p class="contador">Visitantes: <span id="counter">0</span></p>
  </div>
</section>

<section id="sobre" class="section reveal">
  <div class="container">
    <h2>Sobre</h2>
    <p>
      O Programa Agrinho promove educação, sustentabilidade e cidadania.
    </p>
  </div>
</section>

<section id="recursos" class="section alt reveal">
  <div class="container">
    <h2>Recursos</h2>

    <div class="grid">
      <a href="https://www.embrapa.br/" target="_blank" rel="noopener noreferrer">Embrapa</a>
      <a href="https://tvescola.org.br/" target="_blank" rel="noopener noreferrer">TV Escola</a>
      <a href="http://portaldoprofessor.mec.gov.br/" target="_blank" rel="noopener noreferrer">Portal do Professor</a>
    </div>
  </div>
</section>

</main>

<footer class="footer">
  <p>© <span id="year"></span> Agrinho</p>
</footer>

<script src="script.js"></script>
</body>
</html>
